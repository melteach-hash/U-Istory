*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #FFFFFF;
  --off-white: #FAFAFA;
  --light-gray: #F2F2F2;
  --mid-gray: #E0E0E0;
  --text-gray: #888888;
  --text-dark: #1A1A1A;
  --text-body: #333333;
  --red: #E63946;
  --red-light: #FFF0F1;
  --red-dark: #C62828;
  --rose: rgba(230, 57, 70, 0.06);
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --max-w: 1200px;
  --section-py: 120px;
}

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font);
  color: var(--text-body);
  background: var(--white);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Typography ── */
h1, h2, h3, h4 { color: var(--text-dark); font-weight: 600; line-height: 1.2; }
h1 { font-size: clamp(2.4rem, 5vw, 3.6rem); letter-spacing: -0.03em; }
h2 { font-size: clamp(1.8rem, 3.5vw, 2.6rem); letter-spacing: -0.02em; }
h3 { font-size: clamp(1.2rem, 2vw, 1.5rem); }
h4 { font-size: 1.1rem; }
p { max-width: 680px; }
.label { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-gray); font-weight: 500; }

/* ── Layout ── */
.container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }
.section { padding: var(--section-py) 0; }
.section-alt { background: var(--off-white); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px; border-radius: 4px; font-size: 0.9rem;
  font-weight: 500; letter-spacing: 0.04em; cursor: pointer;
  transition: all 0.3s ease; border: none; font-family: var(--font);
  text-decoration: none;
}
.btn-outline {
  background: transparent; border: 1.5px solid var(--text-dark);
  color: var(--text-dark);
}
.btn-outline:hover { background: var(--text-dark); color: var(--white); }
.btn-red { background: var(--red); color: var(--white); border: 1.5px solid var(--red); }
.btn-red:hover { background: var(--red-dark); border-color: var(--red-dark); }
.btn-sm { padding: 8px 20px; font-size: 0.8rem; }

/* ── Deep Dive Toggle ── */
.deep-dive-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 16px; border-radius: 20px; cursor: pointer;
  font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; transition: all 0.3s ease;
  border: 1.5px solid var(--mid-gray); background: var(--white);
  color: var(--text-gray); user-select: none; font-family: var(--font);
}
.deep-dive-toggle.active { border-color: var(--red); color: var(--red); background: var(--red-light); }
.deep-dive-toggle .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--mid-gray); transition: background 0.3s ease;
}
.deep-dive-toggle.active .dot { background: var(--red); }

.deep-content {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.6s ease, opacity 0.4s ease, margin 0.4s ease;
  margin-top: 0;
}
.deep-content.open { max-height: 4000px; opacity: 1; margin-top: 32px; }
.deep-box {
  background: var(--off-white); border-left: 3px solid var(--red);
  padding: 28px 32px; border-radius: 0 8px 8px 0;
}
.deep-box p { color: var(--text-body); font-size: 0.92rem; margin-bottom: 12px; }
.deep-box p:last-child { margin-bottom: 0; }
.deep-box .cite { font-size: 0.8rem; color: var(--text-gray); font-style: italic; }

/* ── Nav ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.3s ease;
}
.nav-inner {
  max-width: var(--max-w); margin: 0 auto; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.nav-logo { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); letter-spacing: -0.02em; }
.nav-logo span { color: var(--red); }
.nav-links { display: flex; gap: 32px; list-style: none; }
.nav-links a {

  font-weight: 500; letter-spacing: 0.04em; transition: color 0.2s;
}
.nav-links a:hover { color: var(--text-dark); }

/* ── Hero ── */
.hero {
  min-height: 100vh; display: flex; align-items: center;
  position: relative; overflow: hidden; padding-top: 60px;
}
.hero::before {
  content: ''; position: absolute; top: -20%; right: -10%;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(230,57,70,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.hero::after {
  content: ''; position: absolute; bottom: -10%; left: -5%;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(230,57,70,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
.hero-text h1 { margin-bottom: 20px; }
.hero-text p { font-size: 1.1rem; color: var(--text-body); margin-bottom: 36px; max-width: 480px; }
.hero-stats { display: flex; gap: 48px; margin-top: 48px; }
.hero-stat-num { font-size: 2rem; font-weight: 700; color: var(--text-dark); }
.hero-stat-num span { color: var(--red); }
.hero-stat-label { font-size: 0.78rem; color: var(--text-gray); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

/* ── Map ── */
.map-container { position: relative; width: 100%; max-width: 520px; }
.map-container svg { width: 100%; height: auto; }

@keyframes blip {
  0%, 100% { r: 3; opacity: 1; }
  50% { r: 6; opacity: 0.5; }
}
@keyframes blip-ring {
  0% { r: 3; opacity: 0.6; }
  100% { r: 18; opacity: 0; }
}

/* ── Cards ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
.card {
  background: var(--white); border: 1px solid var(--mid-gray);
  border-radius: 12px; padding: 32px; transition: all 0.3s ease;

.card:hover { border-color: var(--red); box-shadow: 0 8px 32px rgba(230,57,70,0.08); }
.card-icon {

  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px; font-size: 1.2rem;
}
.card h3 { margin-bottom: 12px; }
.card p { font-size: 0.92rem; color: var(--text-body); }

/* ── Tabs ── */
.tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--mid-gray); margin-bottom: 40px; flex-wrap: wrap; }
.tab-btn {
  padding: 12px 24px; font-size: 0.85rem; font-weight: 500;
  color: var(--text-gray); background: none; border: none;
  cursor: pointer; font-family: var(--font); letter-spacing: 0.03em;

.tab-btn:hover { color: var(--text-dark); }
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

/* ── Metrics ── */
.metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin: 40px 0; }
.metric-box { text-align: center; padding: 28px 16px; }
.metric-num { font-size: 2.8rem; font-weight: 700; color: var(--text-dark); line-height: 1; }
.metric-num .red { color: var(--red); }
.metric-label { font-size: 0.82rem; color: var(--text-gray); margin-top: 8px; letter-spacing: 0.06em; text-transform: uppercase; }

.toc-flow { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: center; margin: 48px 0; }
.toc-step {

  transition: all 0.3s; cursor: default;
}
.toc-step:hover { border-color: var(--red); }
.toc-step h4 { font-size: 0.9rem; margin-bottom: 6px; }
.toc-step p { font-size: 0.78rem; color: var(--text-gray); max-width: 180px; margin: 0 auto; }
.toc-arrow { color: var(--red); font-size: 1.4rem; font-weight: 300; }

/* ── Stories ── */
.story-card {
  background: var(--white); border: 1px solid var(--mid-gray);
  border-radius: 12px; padding: 36px; position: relative; overflow: hidden;
}
.story-card::before {
  content: '\201C'; position: absolute; top: 12px; left: 20px;
  font-size: 4rem; color: var(--red-light); font-family: Georgia, serif; line-height: 1;
}
.story-card p { font-size: 0.95rem; position: relative; z-index: 1; }
.story-card .story-attr { font-size: 0.82rem; color: var(--text-gray); margin-top: 16px; font-style: italic; }

/* ── CTA Section ── */
.cta-section {
  background: var(--text-dark); color: var(--white); padding: 100px 0;
  position: relative; overflow: hidden;

  content: ''; position: absolute; top: -50%; right: -20%;

.cta-section p { color: rgba(255,255,255,0.7); margin-bottom: 36px; }
.cta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 40px; }
.cta-card {
  border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  padding: 28px; transition: all 0.3s;
}
.cta-card:hover { border-color: var(--red); background: rgba(230,57,70,0.08); }
.cta-card h4 { color: var(--white); margin-bottom: 8px; }
.cta-card p { font-size: 0.85rem; color: rgba(255,255,255,0.6); }

/* ── Footer ── */
.footer { padding: 48px 0; border-top: 1px solid var(--mid-gray); }
.footer p { font-size: 0.82rem; color: var(--text-gray); text-align: center; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.8s ease forwards; }
.delay-1 { animation-delay: 0.1s; opacity: 0; }
.delay-2 { animation-delay: 0.2s; opacity: 0; }
.delay-3 { animation-delay: 0.3s; opacity: 0; }
.delay-4 { animation-delay: 0.4s; opacity: 0; }

/* ── SVG Charts ── */
.chart-container { margin: 32px 0; }
.chart-bar { transition: all 0.4s ease; }
.chart-bar:hover { opacity: 0.85; }

/* ── Responsive ── */
@media (max-width: 768px) {
  :root { --section-py: 72px; }
  .hero-grid { grid-template-columns: 1fr; text-align: center; }
  .hero-grid .map-container { order: -1; max-width: 360px; margin: 0 auto; }
  .hero-stats { justify-content: center; gap: 32px; flex-wrap: wrap; }
  .hero-text p { margin-left: auto; margin-right: auto; }
  .nav-links { display: none; }
  .toc-flow { flex-direction: column; }
  .toc-arrow { transform: rotate(90deg); }
  .card-grid { grid-template-columns: 1fr; }
  .tab-bar { gap: 0; }
  .tab-btn { padding: 10px 14px; font-size: 0.78rem; }
  .metric-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

// ── SVG Bar Chart ──
function BarChart(props) {
  var data = props.data;
  var maxVal = Math.max.apply(null, data.map(function(d){ return d.value; }));
  var barWidth = 48;
  var gap = 24;
  var chartH = 180;
  var chartW = data.length * (barWidth + gap);
  var title = props.title || '';

  return e('div', {className: 'chart-container'},
    title && e('p', {className: 'label', style: {marginBottom: 16}}, title),
    e('svg', {viewBox: '0 0 ' + (chartW + 40) + ' ' + (chartH + 50), style: {width: '100%', maxWidth: chartW + 40, height: 'auto'}},
      // Bars
      data.map(function(d, i) {
        var barH = (d.value / maxVal) * chartH;
        var x = 20 + i * (barWidth + gap);
        var y = chartH - barH;
        return e('g', {key: i},
          e('rect', {
            x: x, y: y, width: barWidth, height: barH,
            fill: d.color || '#E63946', rx: 4, className: 'chart-bar', opacity: 0.9
          }),
          e('text', {
            x: x + barWidth / 2, y: y - 8,
            textAnchor: 'middle', fill: '#1A1A1A', fontSize: 12, fontWeight: 600,
            fontFamily: 'Helvetica Neue, Helvetica, Arial, sans-serif'
          }, d.displayValue || d.value),
          e('text', {
            x: x + barWidth / 2, y: chartH + 20,
            textAnchor: 'middle', fill: '#888', fontSize: 10,
            fontFamily: 'Helvetica Neue, Helvetica, Arial, sans-serif'
          }, d.label)
        );
      })
    )
  );
}
