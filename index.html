      },

        body: ['DM Sans', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif']
      },

      }

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #FFFFFF;
  --off-white: #FAFAFA;
  --light-gray: #F2F2F2;
  --mid-gray: #E0E0E0;
  --text-gray: #888888;
  --text-dark: #1A1A1A;
  --text-body: #333333;
  --red: #E63946;
  --red-light: #FFF0F1;
  --red-dark: #C62828;
  --rose: rgba(230, 57, 70, 0.06);
  --font: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-display: 'Instrument Serif', Georgia, 'Times New Roman', serif;
  --max-w: clamp(1000px, 80vw, 1400px);
  /* Spacing scale — viewport-relative for autoscaling */
  --section-py: clamp(48px, 8vh, 120px);
  --content-gap: 32px;
  --element-gap: 20px;
  --tight-gap: 8px;
  --edge-pad: clamp(20px, 5vw, 64px);
}

html { scroll-behavior: smooth; font-size: 16px; scroll-snap-type: y proximity; }

body {
  font-family: var(--font);
  color: var(--text-body);
  background: var(--white);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Typography ── */
h1, h2, h3, h4 { color: var(--red); font-weight: 600; line-height: 1.2; }
h1 { font-family: var(--font-display); font-size: clamp(2.4rem, 5vw, 3.6rem); letter-spacing: -0.03em; font-weight: 400; }
h2 { font-family: var(--font-display); font-size: clamp(1.8rem, 3.5vw, 2.6rem); letter-spacing: -0.02em; font-weight: 400; }
h3 { font-size: clamp(1.2rem, 2vw, 1.5rem); }
h4 { font-size: 1.1rem; }
p { max-width: 680px; }
.label { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-gray); font-weight: 500; }

/* ── Layout ── */
.container { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--edge-pad); }
.section {
  min-height: 100vh; padding: var(--section-py) 0;
  display: flex; flex-direction: column; justify-content: center;
  scroll-snap-align: start;
  position: relative;
}
.section::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; opacity: 0.025;
  filter: url(#grain-filter); background: white;
}
.section > .container { position: relative; z-index: 1; }
.section-alt { background: var(--off-white); }
.section::after {
  content: ''; position: absolute; top: 20%; right: 0;
  width: 40%; height: 60%; border-radius: 50%;
  background: radial-gradient(circle, rgba(230,57,70,0.04) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px; border-radius: 4px; font-size: 0.9rem;
  font-weight: 500; letter-spacing: 0.04em; cursor: pointer;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1); border: none; font-family: var(--font);
  text-decoration: none;
}
.btn:hover { transform: translateY(-2px); }
.btn-outline {
  background: transparent; border: 1.5px solid var(--text-dark);
  color: var(--text-dark);
}
.btn-outline:hover { background: var(--text-dark); color: var(--white); }
.btn-red { background: var(--red); color: var(--white); border: 1.5px solid var(--red); }
.btn-red:hover { background: var(--red-dark); border-color: var(--red-dark); transform: translateY(-2px) scale(1.03); box-shadow: 0 6px 20px rgba(230,57,70,0.25); }
.btn-sm { padding: 8px 20px; font-size: 0.8rem; }

/* ── Deep Dive Toggle ── */
.deep-dive-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 16px; border-radius: 20px; cursor: pointer;
  font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; transition: all 0.3s ease;
  border: 1.5px solid var(--mid-gray); background: var(--white);
  color: var(--text-gray); user-select: none; font-family: var(--font);
}
.deep-dive-toggle:hover { border-color: var(--red); color: var(--red); transform: translateY(-1px); }
.deep-dive-toggle.active { border-color: var(--red); color: var(--red); background: var(--red-light); }
.deep-dive-toggle .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--mid-gray); transition: background 0.3s ease;
}
.deep-dive-toggle.active .dot { background: var(--red); }

.deep-content {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.6s ease, opacity 0.4s ease, margin 0.4s ease;
  margin-top: 0;
}
.deep-content.open { max-height: 4000px; opacity: 1; margin-top: 24px; }
.deep-box {
  background: var(--off-white); border-left: 3px solid var(--red);
  padding: 24px 28px; border-radius: 0 8px 8px 0;
}
.deep-box p { color: var(--text-body); font-size: 0.92rem; margin-bottom: 12px; }
.deep-box p:last-child { margin-bottom: 0; }
.deep-box .cite { font-size: 0.8rem; color: var(--text-gray); font-style: italic; }

/* ── Nav ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.3s ease;
}
.nav-inner {
  max-width: var(--max-w); margin: 0 auto; padding: 0 var(--edge-pad);
  display: flex; align-items: center; justify-content: center;
  height: 72px; position: relative;
}
.nav-logo { display: flex; align-items: center; text-decoration: none; position: absolute; left: var(--edge-pad); }
.nav-logo img { height: 52px; width: auto; transition: opacity 0.2s ease; }
.nav-logo img:hover { opacity: 0.85; }
.nav-links { display: none; gap: 32px; list-style: none; }
@media (min-width: 768px) { .nav-links { display: flex; } }
.nav-links a {
  font-size: 0.82rem; color: var(--text-dark); text-decoration: none;
  font-weight: 500; letter-spacing: 0.04em; transition: color 0.2s;
  position: relative; font-family: var(--font);
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1.5px;
  background: var(--red); transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
.nav-links a:hover { color: var(--text-dark); }
.nav-links a:hover::after { width: 100%; }

/* ── Hero ── */
.hero {
  min-height: 100vh; display: flex; align-items: center;
  position: relative; overflow: clip; padding-top: 72px;
  scroll-snap-align: start;
}
.hero::before {
  content: ''; position: absolute; top: -20%; right: -10%;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(230,57,70,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.hero::after {
  content: ''; position: absolute; bottom: -10%; left: -5%;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(230,57,70,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.hero-doodle {
  position: absolute; pointer-events: none; z-index: 0;
  opacity: 0; animation: doodleFade 1s ease forwards;
  transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
.trail-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.hero-doodle svg { stroke: #1A1A1A; fill: none; stroke-width: 0.6; stroke-linecap: round; stroke-linejoin: round; }
.hero-doodle.d1 { top: 12%; left: 4%; animation-delay: 0.2s; }
.hero-doodle.d2 { top: 8%; right: 6%; animation-delay: 0.35s; }
.hero-doodle.d3 { bottom: 22%; left: 5%; animation-delay: 0.5s; }
.hero-doodle.d4 { bottom: 20%; right: 4%; animation-delay: 0.65s; }
.hero-doodle.d5 { top: 48%; left: 2%; animation-delay: 0.3s; }
.hero-doodle.d6 { top: 45%; right: 2%; animation-delay: 0.45s; }
.hero-doodle.mini { animation-delay: 0s; }
.hero-doodle.mini svg { stroke-width: 0.6; }
@keyframes doodleFade {
  from { opacity: 0; }
  to { opacity: 0.3; }
}
/* ── Timeline Slider ── */
.hero-timeline {
  margin-top: 32px; padding: 0; width: 100%; max-width: 900px; margin-left: auto; margin-right: auto;
}
.timeline-stats {
  display: flex; justify-content: center; gap: 40px; margin-bottom: 20px;
  font-size: 0.82rem; color: var(--text-body); text-align: center;
}
.timeline-stat-val { font-family: var(--font-display); font-size: 1.6rem; font-weight: 400; color: var(--text-dark); line-height: 1.2; }
.timeline-stat-label { font-size: 0.7rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.timeline-track { position: relative; width: 100%; padding: 0; }
.timeline-input {
  -webkit-appearance: none; appearance: none; width: 100%; height: 3px;
  background: var(--mid-gray); border-radius: 2px; outline: none; cursor: pointer;
}
.timeline-input::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 18px; height: 18px;
  border-radius: 50%; background: var(--red); cursor: pointer; border: 2px solid white;
  box-shadow: 0 2px 8px rgba(230,57,70,0.3);
}
.timeline-input::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%; background: var(--red);
  cursor: pointer; border: 2px solid white; box-shadow: 0 2px 8px rgba(230,57,70,0.3);
}
.timeline-years {
  display: flex; justify-content: space-between;
  font-size: 0.82rem; color: var(--text-gray); letter-spacing: 0.02em; font-weight: 500;
}
.timeline-years span { flex: 1; text-align: center; }
.timeline-years .ty-hide { visibility: hidden; }
.timeline-years-top { margin-bottom: 3px; }
.timeline-years-bottom { margin-top: 3px; }
.timeline-year-active { color: var(--red); font-weight: 600; }
@media (max-width: 640px) {
  .hero-doodle { display: none; }
  .timeline-stats { gap: 20px; flex-wrap: wrap; }
  .timeline-stat-val { font-size: 1.2rem; }
  .timeline-years span { font-size: 0.7rem; }
}
@media (max-width: 1024px) and (min-width: 641px) {
  .hero-doodle.d5, .hero-doodle.d6 { display: none; }
}
/* (hero-grid removed — V7 uses centered layout) */
.hero-headline { margin-bottom: 16px; }
.hero-word {
  display: block; font-family: var(--font-display); font-size: clamp(3.2rem, 7.5vw, 5.6rem);
  font-weight: 400; color: var(--text-dark); letter-spacing: -0.04em;
  line-height: 1; margin-bottom: 6px;
}
.hero-sub-line {
  display: block; font-family: var(--font-display); font-size: clamp(1.4rem, 3vw, 2.4rem);
  font-weight: 400; font-style: italic; color: var(--red); letter-spacing: -0.01em; line-height: 1.2;
}
@media (max-width: 640px) {
  .hero-word { font-family: var(--font-display); font-size: clamp(2.4rem, 12vw, 3.6rem); }
  .hero-sub-line { font-family: var(--font-display); font-size: clamp(1.2rem, 5vw, 1.8rem); }
}
/* ── Grain Texture Overlay ── */
.grain {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; opacity: 0.035;
  filter: url(#grain-filter); background: white;
}
/* hero-text p removed — V7 uses centered layout */
.hero-stats { display: flex; gap: 24px; margin-top: 36px; align-items: center; flex-wrap: wrap; justify-content: center; }
@media (min-width: 768px) { .hero-stats { gap: 40px; } }
.hero-stat-num { font-family: var(--font-display); font-size: clamp(2.4rem, 4vw, 3.4rem); font-weight: 400; color: var(--text-dark); line-height: 1; display: flex; align-items: center; justify-content: center; }
.hero-stat-num span { color: var(--red); }
.hero-stat-num .plus { font-size: clamp(1.2rem, 2vw, 1.6rem); display: inline-block; }
.hero-stat-label { font-size: 0.72rem; color: var(--text-gray); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 4px; }

/* ── Map ── */
.map-stat-val { font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 400; font-family: var(--font-display); color: var(--text-dark); line-height: 1; }
.map-stat-lbl { font-size: 0.78rem; color: var(--text-gray); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; font-weight: 600; }
.map-section {
  background: #FBF8F0; padding: clamp(12px, 2vh, 32px) 0;
  min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
  position: relative; overflow: clip;
  scroll-snap-align: start;
}
.map-section::before {
  content: ''; position: absolute;
  top: 20%; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(230,57,70,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.map-section::after {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; opacity: 0.03;
  filter: url(#grain-filter); background: white;
}
.map-container { position: relative; width: 100%; margin: 0 auto; }
.map-wide { margin: 0; padding: 0 clamp(16px, 3vw, 56px); }
.map-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
@media (max-width: 640px) {
  .map-scroll { overflow-x: scroll; }
  .map-scroll .map-container { min-width: 700px; }
}
.map-container svg { width: 100%; height: auto; }
.map-city-dot {
  filter: drop-shadow(0 0 2px rgba(230,57,70,0.3));
  transition: r 0.2s ease, filter 0.2s ease;
}
.map-city-label {
  font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 15px; font-weight: 700; fill: #1a1a1a;
  letter-spacing: 0.01em;
  transition: fill 0.2s ease;
  pointer-events: none;
}
.map-state-header {
  font-family: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px; font-weight: 700; fill: #E63946;
  letter-spacing: 0.1em; text-transform: uppercase;
}
.map-leader { stroke: #999; stroke-width: 0.5; opacity: 0.3; fill: none; transition: opacity 0.2s ease, stroke 0.2s ease; }
.map-city-group { cursor: pointer; }
.map-city-group:hover .map-city-dot { r: 6; filter: drop-shadow(0 0 6px rgba(230,57,70,0.6)); }
.map-city-group:hover .map-city-label { fill: #E63946; }
.map-city-group:hover .map-leader { opacity: 0.7; stroke: #E63946; }

/* ── Cards ── */
.card-grid { display: grid; grid-template-columns: 1fr; gap: 28px; }
@media (min-width: 640px) { .card-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); } }
.card {
  background: var(--white); border: 1px solid var(--mid-gray);
  border-radius: 12px; padding: 32px; transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative; border-left: 3px solid transparent;
}
.card:hover { border-color: var(--red); border-left-color: var(--red); box-shadow: 0 12px 40px rgba(230,57,70,0.10); transform: translateY(-4px); }
.card-icon {
  width: 44px; height: 44px; border-radius: 10px; background: var(--red-light);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px; font-size: 1.2rem;
}
.card h3 { margin-bottom: 10px; }
.card p { font-size: 0.92rem; color: var(--text-body); }

/* ── Tabs ── */
.tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--mid-gray); margin-bottom: 32px; flex-wrap: wrap; }
.tab-btn {
  padding: 12px 24px; font-size: 0.85rem; font-weight: 500;
  color: var(--text-gray); background: none; border: none;
  cursor: pointer; font-family: var(--font); letter-spacing: 0.03em;
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab-btn:hover { color: var(--text-dark); }
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

/* ── Metrics ── */
.metric-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin: 48px 0; }
@media (min-width: 768px) { .metric-row { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 32px; } }
.metric-box { text-align: center; padding: 24px 16px; }
.metric-num { font-family: var(--font-display); font-size: 2.8rem; font-weight: 400; color: var(--text-dark); line-height: 1; }
.metric-num .red { color: var(--red); }
.metric-label { font-size: 0.82rem; color: var(--text-gray); margin-top: 8px; letter-spacing: 0.06em; text-transform: uppercase; }

/* ── TOC Flow ── */
.toc-flow { display: flex; flex-direction: column; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: center; margin: 40px 0; }
@media (min-width: 768px) { .toc-flow { flex-direction: row; } }
.toc-arrow { color: var(--red); font-size: 1.4rem; font-weight: 300; transform: rotate(90deg); }
@media (min-width: 768px) { .toc-arrow { transform: rotate(0deg); } }
.toc-step {
  background: var(--white); border: 1px solid var(--mid-gray); border-radius: 10px;
  padding: 20px 24px; min-width: 160px; text-align: center;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1); cursor: default;
}
.toc-step:hover { border-color: var(--red); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(230,57,70,0.08); }
.toc-step h4 { font-size: 0.9rem; margin-bottom: 6px; font-family: var(--font-display); font-weight: 400; font-size: 1rem; }
.toc-step p { font-size: 0.78rem; color: var(--text-gray); max-width: 180px; margin: 0 auto; }
.toc-arrow { color: var(--red); font-size: 1.4rem; font-weight: 300; }

/* ── Stories ── */
.story-card {
  background: var(--white); border: 1px solid var(--mid-gray);
  border-radius: 12px; padding: 32px; position: relative; overflow: hidden;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}
.story-card:hover { border-color: var(--red); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(230,57,70,0.08); }
.story-card::before {
  content: '\201C'; position: absolute; top: 12px; left: 20px;
  font-size: 4rem; color: var(--red-light); font-family: var(--font-display); line-height: 1;
}
.story-card p { font-size: 0.95rem; position: relative; z-index: 1; }
.story-card .story-quote { font-family: var(--font-display); font-size: 1.08rem; font-style: italic; line-height: 1.8; }
.story-card .story-attr { font-size: 0.82rem; color: var(--text-gray); margin-top: 16px; font-style: italic; }

/* ── CTA Section ── */
.cta-section {
  background: var(--text-dark); color: var(--white); padding: var(--section-py) 0;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: clip;
  scroll-snap-align: start;
}
.cta-section::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(230,57,70,0.15) 0%, transparent 70%);
}
.cta-section::after {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; opacity: 0.04;
  filter: url(#grain-filter); background: white;
}
.cta-section h2 { color: var(--white); margin-bottom: 12px; font-family: var(--font-display); font-weight: 400; }
.cta-section p { color: rgba(255,255,255,0.7); margin-bottom: 28px; }
.cta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-top: 36px; }
.cta-card {
  border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  padding: 28px; transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}
.cta-card:hover { border-color: var(--red); background: rgba(230,57,70,0.08); transform: translateY(-4px); }

  will-change: opacity, transform;
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-left {
  opacity: 0;
  transform: translateX(-40px);
  transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: opacity, transform;
}
.reveal-left.visible { opacity: 1; transform: translateX(0); }
.reveal-right {
  opacity: 0;
  transform: translateX(40px);
  transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: opacity, transform;
}
.reveal-right.visible { opacity: 1; transform: translateX(0); }
.reveal-scale {
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: opacity, transform;
}
.reveal-scale.visible { opacity: 1; transform: scale(1); }

/* Stagger delays for children */
.stagger-1 { transition-delay: 0.08s; }
.stagger-2 { transition-delay: 0.16s; }
.stagger-3 { transition-delay: 0.24s; }
.stagger-4 { transition-delay: 0.32s; }
.stagger-5 { transition-delay: 0.40s; }
.stagger-6 { transition-delay: 0.48s; }

/* Enhanced section decorative line */
.section-heading-line {
  width: 40px; height: 2px; background: var(--red);

  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.visible .section-heading-line { width: 60px; }

/* Hero entrance (immediate, no scroll trigger) */
@keyframes heroFadeUp {
  from { opacity: 0; transform: translateY(32px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes heroCountUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.hero-enter { animation: heroFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.hero-enter-delay-1 { animation: heroFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards; opacity: 0; }
.hero-enter-delay-2 { animation: heroFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards; opacity: 0; }
.hero-enter-delay-3 { animation: heroCountUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards; opacity: 0; }

/* Tab switch animation */
@keyframes tabFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }

.nav { transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease; }

/* ── Map Cascade Animation ── */
.map-dot-anim { transform: scale(0); transform-box: fill-box; transform-origin: center; }

.map-name-anim { opacity: 0; }
.map-header-anim { opacity: 0; }
.map-entered .map-dot-anim {
  animation: mapDotIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.map-entered .map-line-anim {
  animation: mapLineIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.map-entered .map-name-anim {
  animation: mapNameIn 0.35s ease forwards;
}
.map-entered .map-header-anim {
  animation: mapNameIn 0.4s ease forwards;

@keyframes mapDotIn {
  0% { transform: scale(0); filter: drop-shadow(0 0 0 transparent); }

@keyframes mapLineIn {
  to { stroke-dashoffset: 0; }

@keyframes mapNameIn {

/* ── Map Header Entrance ── */
.map-header-group {
  opacity: 0; transform: translateX(60px);
  transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.map-header-group.entered {
  opacity: 1; transform: translateX(0);
}
.map-stats-group {
  opacity: 0; transform: translateX(60px);

}
.map-stats-group.entered {
  opacity: 1; transform: translateX(0);
}

/* ── A: Scroll Hint ── */
.scroll-hint {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);

@keyframes scrollBounce {

/* ── B: Stat Callout (full-width bold moment) ── */
.stat-callout {

  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.stat-callout::before {

.stat-callout-num {

}
.stat-callout-num .red { color: var(--red); }
.stat-callout-label {

}

/* ── C: Progress Dots ── */
.progress-dots {
  position: fixed; right: 20px; top: 50%; transform: translateY(-50%);

}
.progress-dot {
  width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--mid-gray);
  background: transparent; cursor: pointer; transition: all 0.3s ease;
  padding: 0;
}
.progress-dot:hover { border-color: var(--red); transform: scale(1.3); }
.progress-dot.active { background: var(--red); border-color: var(--red); transform: scale(1.2); }
@media (max-width: 640px) {
  .progress-dots { right: 10px; gap: 10px; }
  .progress-dot { width: 6px; height: 6px; }
}

/* ── D: Program Comparison Table ── */
.compare-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 32px 0; }
.compare-table {

}
.compare-table th {

}
.compare-table td {
  padding: 12px 16px; border-bottom: 1px solid var(--mid-gray);

}
.compare-table tr:last-child td { border-bottom: none; }

@media (max-width: 640px) {

.story-badge {
  display: inline-flex; align-items: center; gap: 6px;

  font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;

.story-badge.girls { background: rgba(156,39,176,0.08); color: #9C27B0; }

/* ── F: Flip Cards ── */
.flip-card {

}
.flip-card-inner {
  position: relative; width: 100%; height: 100%;
  transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  transform-style: preserve-3d;
}
.flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
.flip-card-front, .flip-card-back {

}
.flip-card-back {

.flip-hint {

      frameworks: "U&I's work aligns with SDG 4 (Quality Education), SDG 5 (Gender Equality through Teach Girls), SDG 8 (Decent Work through Teach for Careers), and SDG 10 (Reduced Inequalities). The Teaching at the Right Level (TaRL) methodology, validated by J-PAL through six randomized controlled trials across seven Indian states, forms the pedagogical backbone.",

// ── India Map (v7 — grouped, square frame, interactive) ──
function IndiaMap(props) {
  var animate = props && props.animate;
  var VBW = 1350;
  var VBH = 1000;
  // Crop viewBox to eliminate dead space (content starts ~y:200, ends ~y:950)
  var VB_TOP = 110;
  var VB_BOTTOM = 980;
  var VB_VISIBLE_H = VB_BOTTOM - VB_TOP;
  var SCALE = 875 / 663;
  var IMG_W = Math.round(663 * SCALE);
  var IMG_H = Math.round(530 * SCALE);
  var IMG_X = Math.floor((VBW - IMG_W) / 2);
  var IMG_Y = Math.floor((VBH - IMG_H) / 2);

  var LXS = VBW / 1100;
  var LYS = VBH / 800;

  // Geographic order: north → south for cascade
  var geoOrder = {'J&K':0, 'NCR':1, 'Rajasthan':2, 'Assam':3, 'Bihar / UP':4,
    'Gujarat':5, 'MP':6, 'West Bengal':7, 'Maharashtra':8, 'Odisha':9,
    'Telangana':10, 'Karnataka':11, 'Andhra Pradesh':12, 'Tamil Nadu':13, 'Keralam':14};
  var GROUP_DELAY = 120;
  var DOT_OFFSET = 0;
  var LINE_OFFSET = 250;
  var NAME_OFFSET = 400;

  var tip = useState(null);
  var tipData = tip[0]; var setTip = tip[1];

  function tr(ox, oy) {
    return [Math.round(ox * SCALE * 10 + IMG_X * 10) / 10, Math.round(oy * SCALE * 10 + IMG_Y * 10) / 10];
  }

  function del(groupIdx, phaseOffset) {
    return ((groupIdx * GROUP_DELAY) + phaseOffset) + 'ms';
  }

  var elements = [];

  DATA.cityGroups.forEach(function(group) {
    var state = group.state;
    var anchor = group.anchor;
    var hx = Math.round(group.hx * LXS);
    var cities = group.cities;
    if (!cities.length) return;
    var gi = geoOrder[state] !== undefined ? geoOrder[state] : 7;

    var firstLy = Math.round(cities[0].ly * LYS);
    var headerProps;
    if (anchor === 'middle') {
      var avgX = 0; cities.forEach(function(c){ avgX += c.lx * LXS; }); avgX /= cities.length;
      headerProps = {x: Math.round(avgX), y: firstLy - 20, textAnchor: 'middle'};
    } else {
      headerProps = {x: hx, y: firstLy - 14, textAnchor: anchor};
    }
    elements.push(e('text', Object.assign({key: 'h-' + state}, headerProps, {
      className: 'map-state-header map-header-anim',
      style: {animationDelay: del(gi, NAME_OFFSET)}
    }), state));

    cities.forEach(function(c) {
      var pos = tr(c.ox, c.oy);
      var cx = pos[0], cy = pos[1];
      var lx = Math.round(c.lx * LXS);
      var ly = Math.round(c.ly * LYS);
      var polyline;
      if (anchor === 'middle') {
        polyline = cx + ',' + cy + ' ' + cx + ',' + (ly - 8) + ' ' + lx + ',' + (ly - 8);
      } else if (anchor === 'end') {
        polyline = (lx + 4) + ',' + ly + ' ' + cx + ',' + ly + ' ' + cx + ',' + cy;
      } else {
        polyline = (lx - 4) + ',' + ly + ' ' + cx + ',' + ly + ' ' + cx + ',' + cy;
      }
      var pctX = (cx / VBW * 100).toFixed(1);
      var pctY = ((cy - VB_TOP) / VB_VISIBLE_H * 100).toFixed(1);
      elements.push(
        e('g', {key: c.n, className: 'map-city-group',
          onMouseEnter: function() { setTip({name: c.n, state: state, x: pctX, y: pctY}); },
          onMouseLeave: function() { setTip(null); },
          onClick: function() { setTip(function(prev) { return prev && prev.name === c.n ? null : {name: c.n, state: state, x: pctX, y: pctY}; }); }
        },
          e('polyline', {points: polyline, className: 'map-leader map-line-anim',
            style: {animationDelay: del(gi, LINE_OFFSET)}}),
          e('circle', {cx: cx, cy: cy, r: 4, fill: '#E63946',
            className: 'map-city-dot map-dot-anim',
            style: {animationDelay: del(gi, DOT_OFFSET)}}),
          e('text', {x: lx, y: ly + 3, textAnchor: anchor,
            className: 'map-city-label map-name-anim',
            style: {animationDelay: del(gi, NAME_OFFSET)}}, c.n)
        )
      );
    });
  });

  return e('div', {className: 'map-container relative' + (animate ? ' map-entered' : '')},
    e('svg', {viewBox: '0 ' + VB_TOP + ' ' + VBW + ' ' + VB_VISIBLE_H, xmlns: 'http://www.w3.org/2000/svg'},
      e('image', {href: 'data:image/png;base64,' + DATA.mapImage, x: IMG_X, y: IMG_Y, width: IMG_W, height: IMG_H}),
      elements
    ),
    tipData ? e('div', {className: 'map-tooltip visible', style: {left: tipData.x + '%', top: tipData.y + '%'}},
      tipData.name, ' · ', tipData.state
    ) : null
  );
}

// ── SVG Bar Chart ──
function BarChart(props) {
  var data = props.data;
  var maxVal = Math.max.apply(null, data.map(function(d){ return d.value; }));
  var barWidth = 48;
  var gap = 24;
  var chartH = 180;
  var chartW = data.length * (barWidth + gap);
  var title = props.title || '';

  return e('div', {className: 'chart-container'},
    title && e('p', {className: 'label mb-4'}, title),
    e('svg', {viewBox: '0 0 ' + (chartW + 40) + ' ' + (chartH + 50), style: {width: '100%', maxWidth: chartW + 40, height: 'auto'}},
      // Bars
      data.map(function(d, i) {
        var barH = (d.value / maxVal) * chartH;
        var x = 20 + i * (barWidth + gap);
        var y = chartH - barH;
        return e('g', {key: i},
          e('rect', {
            x: x, y: y, width: barWidth, height: barH,
            fill: d.color || '#E63946', rx: 4, className: 'chart-bar', opacity: 0.9
          }),
          e('text', {
            x: x + barWidth / 2, y: y - 8,
            textAnchor: 'middle', fill: '#1A1A1A', fontSize: 12, fontWeight: 600,
            fontFamily: 'DM Sans, Helvetica Neue, Helvetica, Arial, sans-serif'
          }, d.displayValue || d.value),
          e('text', {
            x: x + barWidth / 2, y: chartH + 20,
            textAnchor: 'middle', fill: '#888', fontSize: 10,
            fontFamily: 'DM Sans, Helvetica Neue, Helvetica, Arial, sans-serif'
          }, d.label)
        );
      })
    )
  );
}

// ── Hero Section ──
function Hero() {
  var ref = useRef(null);
  var heroRef = useRef(null);
  var yearState = useState(15);
  var currentIdx = yearState[0]; var setIdx = yearState[1];

  var TIMELINE = [
    {y:2011,b:50,v:12,c:1,ci:1},{y:2012,b:150,v:45,c:2,ci:1},{y:2013,b:400,v:120,c:4,ci:2},{y:2014,b:900,v:280,c:7,ci:3},
    {y:2015,b:1800,v:500,c:12,ci:4},{y:2016,b:3200,v:950,c:18,ci:5},{y:2017,b:5500,v:1800,c:26,ci:8},{y:2018,b:9000,v:3500,c:38,ci:12},
    {y:2019,b:16000,v:6500,c:52,ci:18},{y:2020,b:23000,v:10000,c:62,ci:22},{y:2021,b:32000,v:14000,c:78,ci:27},{y:2022,b:42000,v:19000,c:92,ci:31},
    {y:2023,b:50000,v:23000,c:108,ci:34},{y:2024,b:57000,v:26000,c:125,ci:37},{y:2025,b:62000,v:28500,c:140,ci:38},{y:2026,b:65000,v:30000,c:150,ci:38}
  ];
  var snap = TIMELINE[currentIdx];
  function fmtNum(n) { if (n >= 1000) return (n/1000).toFixed(n >= 10000 ? 0 : 1) + 'K'; return String(n); }

  useEffect(function() {
    var ticking = false;
    function onScroll() {
      if (ticking) return; ticking = true;
      requestAnimationFrame(function() {
        if (ref.current) {
          var y = window.pageYOffset;
          ref.current.style.opacity = Math.max(1 - y / 600, 0);
          ref.current.style.transform = 'translateY(' + (y * 0.25) + 'px)';
        }
        ticking = false;
      });
    }
    window.addEventListener('scroll', onScroll, {passive: true});
    return function() { window.removeEventListener('scroll', onScroll); };
  }, []);

  // Water trail + doodle displacement
  useEffect(function() {
    var hero = heroRef.current; if (!hero) return;
    var canvas = hero.querySelector('.trail-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var trail = [];
    var maxAge = 35;
    var animId;
    var mouseX = -999, mouseY = -999;

    function resize() { canvas.width = hero.offsetWidth; canvas.height = hero.offsetHeight; }
    resize();
    window.addEventListener('resize', resize);

    function handlePointer(x, y) {
      var rect = hero.getBoundingClientRect();
      mouseX = x - rect.left;
      mouseY = y - rect.top;
      trail.push({x: mouseX, y: mouseY, age: 0});
      if (trail.length > 30) trail.shift();
    }

    function onMove(ev) { handlePointer(ev.clientX, ev.clientY); }
    function onTouch(ev) { var t = ev.touches[0]; handlePointer(t.clientX, t.clientY); }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Age and cull trail
      for (var i = trail.length - 1; i >= 0; i--) {
        trail[i].age++;
        if (trail[i].age > maxAge) trail.splice(i, 1);
      }

      // Draw trail
      for (var j = 0; j < trail.length; j++) {
        var p = trail[j];
        var alpha = (1 - p.age / maxAge) * 0.18;
        var r = (1 - p.age / maxAge) * 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(230,57,70,' + alpha + ')';
        ctx.fill();
      }

      // Displace doodles near cursor
      var doodles = hero.querySelectorAll('.hero-doodle');
      var heroRect = hero.getBoundingClientRect();
      doodles.forEach(function(d) {
        var dr = d.getBoundingClientRect();
        var dx = (dr.left + dr.width / 2 - heroRect.left) - mouseX;
        var dy = (dr.top + dr.height / 2 - heroRect.top) - mouseY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var threshold = 100;
        if (dist < threshold && dist > 0) {
          var force = (1 - dist / threshold) * 35;
          var angle = Math.atan2(dy, dx);
          d.style.transform = 'translate(' + (Math.cos(angle) * force).toFixed(1) + 'px,' + (Math.sin(angle) * force).toFixed(1) + 'px)';
        } else {
          d.style.transform = 'translate(0,0)';
        }
      });

      animId = requestAnimationFrame(tick);
    }
    tick();

    hero.addEventListener('mousemove', onMove);
    hero.addEventListener('touchmove', onTouch, {passive: true});
    hero.addEventListener('mouseleave', function() { mouseX = -999; mouseY = -999; });

    return function() {
      cancelAnimationFrame(animId);
      hero.removeEventListener('mousemove', onMove);
      hero.removeEventListener('touchmove', onTouch);
      window.removeEventListener('resize', resize);
    };
  }, []);

    var el = sectionRef.current;

    return function() { observer.disconnect(); };

// ── C: Progress Dots ──
function ProgressDots() {
  var sections = [
    {id: 'hero', label: 'Hero'},
    {id: 'map', label: 'Map'},
    {id: 'story', label: 'Story'},
    {id: 'sdg', label: 'SDG'},
    {id: 'toc', label: 'TOC'},
    {id: 'programs', label: 'Programs'},
    {id: 'impact', label: 'Impact'},
    {id: 'stories', label: 'Stories'},
    {id: 'stakeholders', label: 'Involve'}
  ];
  var active = useState('hero');
  var current = active[0]; var setCurrent = active[1];

  useEffect(function() {
    var observers = [];
    sections.forEach(function(s) {
      var el = document.getElementById(s.id);
      if (!el) return;
      var obs = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) setCurrent(s.id);
      }, {threshold: 0.3});
      obs.observe(el);
      observers.push(obs);
    });
    return function() { observers.forEach(function(o) { o.disconnect(); }); };
  }, []);

  return e('nav', {className: 'progress-dots', 'aria-label': 'Section navigation'},
    sections.map(function(s) {
      return e('button', {
        key: s.id,
        className: 'progress-dot' + (current === s.id ? ' active' : ''),
        onClick: function() {
          var el = document.getElementById(s.id);
          if (el) el.scrollIntoView({behavior: 'smooth'});
        },
        'aria-label': s.label,
        title: s.label
      });
    })
  );
}

// ── Scroll Progress Bar ──
function ScrollProgress() {
  var ref = useRef(null);
  useEffect(function() {
    var ticking = false;
    function onScroll() {
      if (ticking) return; ticking = true;
      requestAnimationFrame(function() {
        var h = document.documentElement.scrollHeight - window.innerHeight;
        var p = h > 0 ? window.pageYOffset / h : 0;
        if (ref.current) ref.current.style.transform = 'scaleX(' + Math.min(p, 1) + ')';
        ticking = false;
      });
    }
    window.addEventListener('scroll', onScroll, {passive: true});
    onScroll();
    return function() { window.removeEventListener('scroll', onScroll); };
  }, []);
  return e('div', {ref: ref, className: 'scroll-progress', style: {width: '100%', transform: 'scaleX(0)'}, 'aria-hidden': 'true'});
}
